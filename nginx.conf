server {
    listen ${PORT};

    # Ne jamais cacher index.html et les fichiers Flutter critiques
    location ~* (index\.html|flutter\.js|flutter_service_worker\.js|main\.dart\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
