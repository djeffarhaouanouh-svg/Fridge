server {
    listen ${PORT};

    # Proxy SQL Neon : le front web appelle /api/neon/sql (même origine) pour éviter CORS.
    location = /api/neon/sql {
        proxy_pass https://ep-dawn-night-abd29yl2-pooler.eu-west-2.aws.neon.tech/sql;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ep-dawn-night-abd29yl2-pooler.eu-west-2.aws.neon.tech;
        proxy_set_header Authorization "${NEON_AUTH_HEADER}";
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Accept $http_accept;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 2m;
    }

    # Ne jamais cacher index.html et les fichiers Flutter critiques
    location ~* (index\.html|flutter\.js|flutter_service_worker\.js|main\.dart\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
